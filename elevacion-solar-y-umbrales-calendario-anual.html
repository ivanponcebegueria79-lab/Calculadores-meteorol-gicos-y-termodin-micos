<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario Solar Profesional (Algoritmo NOAA)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .setup { display: flex; flex-wrap: wrap; gap: 15px; background: #edf2f7; padding: 20px; border-radius: 8px; justify-content: center; align-items: flex-end; }
        .input-box { display: flex; flex-direction: column; gap: 5px; font-size: 0.9em; }
        input, select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; }
        button { padding: 10px 25px; background: #3182ce; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2b6cb0; }
        .table-container { height: 550px; overflow-y: auto; margin-top: 20px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; background: #2d3748; color: white; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #edf2f7; font-size: 0.85em; }
        .solsticio { background-color: #fffaf0; border-left: 4px solid #ed8936; }
        .equinoccio { background-color: #ebf8ff; border-left: 4px solid #4299e1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculador Solar de Alta Precisión (NOAA)</h2>
    <div class="setup">
        <div class="input-box"><label>Año</label><input type="number" id="year" value="2026"></div>
        <div class="input-box"><label>Latitud (°)</label><input type="number" id="latDeg" value="40.4167" step="any"></div>
        <div class="input-box"><label>Hemisferio</label>
            <select id="hem"><option value="1">Norte</option><option value="-1">Sur</option></select>
        </div>
        <button onclick="generar()">Calcular Datos</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Decl. Solar</th>
                    <th>Elev. Máx</th>
                    <th>Luz Total (>0°)</th>
                    <th>> 15°</th>
                    <th>> 30°</th>
                    <th>> 45°</th>
                    <th>> 60°</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>
// Algoritmo simplificado de la NOAA para posición solar
function calcularDatosSolar(diaAno, anio, latitud) {
    const d = diaAno + 0.5; // Mediodía solar estimado
    const n = anio - 2000;
    const JD = 2451545.0 + (365 * n) + Math.floor((n + 3) / 4) + diaAno - 1;
    const T = (JD - 2451545.0) / 36525.0; // Siglo Juliano

    // Geometría solar
    let L0 = 280.46646 + T * (36000.76983 + T * 0.0003032);
    let M = 357.52911 + T * (35999.05029 - T * 0.0001537);
    let e = 0.016708634 - T * (0.000042037 + 0.0000001267 * T);
    
    // Ecuación del centro
    let C = (1.914602 - T * (0.004817 + 0.000014 * T)) * Math.sin(M * Math.PI / 180) +
            (0.019993 - 0.000101 * T) * Math.sin(2 * M * Math.PI / 180) +
            0.000289 * Math.sin(3 * M * Math.PI / 180);
            
    let sunLong = L0 + C;
    let epsilon = 23.439291 - T * (0.01300416 + T * 0.000000164); // Oblicuidad real
    
    // Declinación
    let declinacion = Math.asin(Math.sin(epsilon * Math.PI / 180) * Math.sin(sunLong * Math.PI / 180));
    
    return {
        decl: declinacion, // en radianes
        declDeg: declinacion * (180 / Math.PI)
    };
}

function generar() {
    const year = parseInt(document.getElementById('year').value);
    const lat = parseFloat(document.getElementById('latDeg').value) * parseFloat(document.getElementById('hem').value);
    const phi = lat * (Math.PI / 180);
    const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    const dias = isLeap ? 366 : 365;
    const body = document.getElementById('resBody');
    body.innerHTML = "";

    for (let i = 1; i <= dias; i++) {
        const solar = calcularDatosSolar(i, year, lat);
        const delta = solar.decl;
        
        // Elevación Máxima
        const sinAlphaMax = Math.sin(phi) * Math.sin(delta) + Math.cos(phi) * Math.cos(delta);
        const alphaMax = Math.asin(Math.max(-1, Math.min(1, sinAlphaMax))) * (180 / Math.PI);
        
        const tr = document.createElement('tr');
        // Detección visual de eventos basada en declinación (Precisa)
        if (Math.abs(solar.declDeg) < 0.2) tr.className = "equinoccio";
        if (Math.abs(solar.declDeg) > 23.4) tr.className = "solsticio";

        let html = `<td>${new Date(year, 0, i).toLocaleDateString('es-ES', {day:'2-digit', month:'short'})}</td>`;
        html += `<td>${solar.declDeg.toFixed(2)}°</td>`;
        html += `<td style="font-weight:bold">${alphaMax.toFixed(2)}°</td>`;

        [0, 15, 30, 45, 60].forEach(hDef => {
            const hCorr = hDef === 0 ? -0.833 : hDef;
            const hRad = hCorr * (Math.PI / 180);
            const cosOmega = (Math.sin(hRad) - Math.sin(phi) * Math.sin(delta)) / (Math.cos(phi) * Math.cos(delta));
            
            let horas = 0;
            if (cosOmega <= -1) horas = 24;
            else if (cosOmega < 1) horas = (2 * Math.acos(cosOmega) * (180 / Math.PI)) / 15;
            
            html += `<td>${horas.toFixed(2)}h</td>`;
        });

        tr.innerHTML = html;
        body.appendChild(tr);
    }
}
</script>
</body>
</html>

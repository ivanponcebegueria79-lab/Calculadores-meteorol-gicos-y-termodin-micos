<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculador Termodinámico Avanzado</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid #334155; }
        h2 { color: #38bdf8; border-bottom: 2px solid #0ea5e9; padding-bottom: 10px; margin-top: 0; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        input { padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #38bdf8; font-weight: bold; outline: none; }
        .results { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #1e293b; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .val { font-family: 'Courier New', monospace; color: #f472b6; }
        .main-res { margin-top: 15px; padding: 20px; background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); border-radius: 10px; text-align: center; }
        .speed-val { font-size: 2.2rem; font-weight: 800; display: block; color: white; }
        .bar-container { background: #334155; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; display: flex; }
        .bar-conv { background: #fbbf24; height: 100%; transition: width 0.4s; }
        .bar-evap { background: #38bdf8; height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<div class="card">
    <h2>Análisis Térmico de Precisión</h2>
    
    <div class="grid">
        <div class="input-group">
            <label>Temp. Agua (°C)</label>
            <input type="number" id="twater" value="50" step="0.1" oninput="process()">
        </div>
        <div class="input-group">
            <label>Temp. Aire (°C)</label>
            <input type="number" id="tdry" value="20" step="0.1" oninput="process()">
        </div>
        <div class="input-group">
            <label>Altitud (msnm)</label>
            <input type="number" id="alt" value="0" oninput="process()">
        </div>
        <div class="input-group">
            <label>Humedad Relativa (%)</label>
            <input type="number" id="rh" value="50" min="0" max="100" oninput="process()">
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>Viento (km/h)</label>
            <input type="number" id="wind" value="10" oninput="process()">
        </div>
    </div>

    <div class="results">
        <div class="row"><span>Presión Local:</span> <span class="val" id="p_val">--</span></div>
        <div class="row"><span>Densidad Aire Húmedo (rho):</span> <span class="val" id="rho_val">--</span></div>
        <div class="row"><span>T. Bulbo Húmedo (Twet):</span> <span class="val" id="tw_val" style="color:#38bdf8">--</span></div>
        <hr style="border:0; border-top:1px solid #334155;">
        <div class="row"><span>Pérdida Convectiva (Qc):</span> <span class="val" id="conv_val">--</span></div>
        <div class="row"><span>Pérdida Evaporativa (Qe):</span> <span class="val" id="evap_val">--</span></div>
        
        <div class="bar-container">
            <div id="b_conv" class="bar-conv"></div>
            <div id="b_evap" class="bar-evap"></div>
        </div>

        <div class="main-res">
            <span class="speed-val" id="total_val">--</span>
            <span style="font-size: 0.7rem; color: #e0f2fe; text-transform: uppercase;">Watts por metro cuadrado (W/m2)</span>
        </div>
    </div>
</div>

<script>
function process() {
    const Twat = parseFloat(document.getElementById('twater').value);
    const Tair = parseFloat(document.getElementById('tdry').value);
    const rh = parseFloat(document.getElementById('rh').value) / 100;
    const alt = parseFloat(document.getElementById('alt').value);
    const V = parseFloat(document.getElementById('wind').value) / 3.6;

    // 1. Presión Atmosférica (OACI)
    const P = 1013.25 * Math.pow(1 - (0.0065 * alt / 288.15), 5.255);
    
    // 2. Presión de vapor y Densidad del Aire Húmedo
    const es_air = 6.112 * Math.exp((17.67 * Tair) / (Tair + 243.5));
    const e_air = rh * es_air;
    
    // rho = (Pd / (Rd * T)) + (Pv / (Rv * T))
    // Rd = 287.05, Rv = 461.495
    const T_k = Tair + 273.15;
    const rho_húmedo = ((P - e_air) * 100 / (287.05 * T_k)) + (e_air * 100 / (461.495 * T_k));

    // 3. Newton-Raphson para Twet (Davies-Jones)
    let Tw = Tair; 
    const gamma = 0.00066 * P; 
    for(let i=0; i<10; i++) {
        let ew = 6.112 * Math.exp((17.67 * Tw) / (Tw + 243.5));
        let de_dt = ew * (17.67 * 243.5) / Math.pow(Tw + 243.5, 2);
        let f = e_air - ew + gamma * (Tair - Tw);
        let df = -de_dt - gamma;
        Tw = Tw - f/df;
    }

    // 4. Convección (Qc) - Basada en rho y V
    const h_c = (5.6 + 4.0 * V) * (rho_húmedo / 1.225);
    let Qc = h_c * (Twat - Tair);

    // 5. Evaporación (Qe) - Basada en P y diferencia de presiones de vapor
    const es_wat = 6.112 * Math.exp((17.67 * Twat) / (Twat + 243.5));
    const h_e = (15 + 12 * V) * (1013.25 / P); 
    let Qe = h_e * (es_wat - e_air);

    // 6. Totales
    let Q_total = Qc + Qe;
    if (Q_total < 0) Q_total = 0;

    document.getElementById('p_val').innerText = P.toFixed(1) + " hPa";
    document.getElementById('rho_val').innerText = rho_húmedo.toFixed(4) + " kg/m3";
    document.getElementById('tw_val').innerText = Tw.toFixed(2) + " °C";
    document.getElementById('conv_val').innerText = Qc.toFixed(1) + " W/m2";
    document.getElementById('evap_val').innerText = Qe.toFixed(1) + " W/m2";
    document.getElementById('total_val').innerText = Q_total.toFixed(1);

    const pc = (Qc / Math.max(Q_total, 1)) * 100;
    const pe = (Qe / Math.max(Q_total, 1)) * 100;
    document.getElementById('b_conv').style.width = Math.max(0, pc) + "%";
    document.getElementById('b_evap').style.width = Math.max(0, pe) + "%";
}
process();
</script>
</body>
</html>

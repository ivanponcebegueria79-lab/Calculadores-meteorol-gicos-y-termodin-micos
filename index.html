<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Calculadores Meteorológicos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 500px; }
        h1 { color: #38bdf8; margin-bottom: 30px; font-size: 1.8rem; }
        .menu-grid { display: grid; gap: 15px; }
        .btn { 
            display: block; 
            padding: 15px; 
            background: #334155; 
            color: #38bdf8; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            border: 1px solid #38bdf8;
            transition: all 0.3s;
        }
        .btn:hover { background: #38bdf8; color: #0f172a; transform: translateY(-2px); }
        .btn.inactive { border-color: #475569; color: #475569; cursor: not-allowed; }
    </style>
</head>

<div class="container">

    </div>
